name: Deploy → Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: []   # runs independently; CI runs in parallel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (smoke tests post-deploy)
        run: npx playwright install chromium --with-deps

      - name: Build (Next.js + OpenNext)
        run: npm run build:cf

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-deploy smoke tests
        run: npx playwright test tests/smoke.spec.ts --project=chromium
        env:
          BASE_URL: https://sonicwavestudio.com

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-deploy-smoke
          path: playwright-report/
          retention-days: 3
